name: dadaledus
version: 0.1.0
description: Financial control plane for Hermes agents. A double-entry ledger, Stripe earn plus approval-gated spend, and bounded self-evolving pricing. The agent runs a business and keeps its own books.
author: esaradev
provides_tools:
  - treasury_intake
  - treasury_collect
  - treasury_fulfill
  - treasury_pnl
  - treasury_open_orders
  - treasury_evolve
  - treasury_rollback
provides_hooks:
  - on_session_start
  - on_session_end
