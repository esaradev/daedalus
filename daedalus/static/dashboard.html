<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>daedalus</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0d0f12; color: #d8dde3;
         font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
  main { max-width: 860px; margin: 0 auto; padding: 32px 20px; }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: .04em; margin: 0; }
  .sub { color: #6b7280; font-size: 12px; margin: 4px 0 28px; }
  .nums { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
          background: #1c2026; border: 1px solid #1c2026; }
  .num { background: #0d0f12; padding: 16px 18px; }
  .num .label { color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  .num .val { font-size: 22px; margin-top: 6px; }
  .pos { color: #4ade80; } .neg { color: #f87171; } .warn { color: #fbbf24; }
  section { margin-top: 28px; }
  h2 { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: .06em; }
  table { width: 100%; border-collapse: collapse; }
  td, th { text-align: left; padding: 6px 8px; border-bottom: 1px solid #161a1f; font-size: 13px; }
  th { color: #6b7280; font-weight: 500; }
  .blocked { color: #f87171; } .ok { color: #4ade80; }
  .feed div { padding: 6px 8px; border-bottom: 1px solid #161a1f; }
</style>
</head>
<body>
<main>
  <h1>daedalus</h1>
  <div class="sub" id="status">the agent's books, live</div>

  <div class="nums">
    <div class="num"><div class="label">revenue</div><div class="val pos" id="revenue">—</div></div>
    <div class="num"><div class="label">cost</div><div class="val neg" id="cost">—</div></div>
    <div class="num"><div class="label">profit</div><div class="val" id="profit">—</div></div>
    <div class="num"><div class="label">blocked actions</div><div class="val warn" id="blocked">—</div></div>
    <div class="num"><div class="label">repriced</div><div class="val" id="repriced">—</div></div>
    <div class="num"><div class="label">book balanced</div><div class="val" id="balanced">—</div></div>
  </div>

  <section>
    <h2>spend decisions</h2>
    <div class="feed" id="feed"></div>
  </section>

  <section>
    <h2>ledger</h2>
    <table><thead><tr><th>#</th><th>kind</th><th>memo</th><th>amount</th></tr></thead>
    <tbody id="ledger"></tbody></table>
  </section>
</main>
<script>
const usd = c => (c < 0 ? "-$" : "$") + (Math.abs(c) / 100).toFixed(2);
async function refresh() {
  try {
    const [n, l, e] = await Promise.all([
      fetch("/api/numbers").then(r => r.json()),
      fetch("/api/ledger").then(r => r.json()),
      fetch("/api/events").then(r => r.json()),
    ]);
    document.getElementById("status").textContent =
      `stripe=${n.status.stripe} · nemotron=${n.status.nemotron} · approval=${n.status.approval_mode}`;
    document.getElementById("revenue").textContent = usd(n.revenue_cents);
    document.getElementById("cost").textContent = usd(n.cost_cents);
    const prof = document.getElementById("profit");
    prof.textContent = usd(n.profit_cents);
    prof.className = "val " + (n.profit_cents >= 0 ? "pos" : "neg");
    document.getElementById("blocked").textContent = n.blocked_actions;
    document.getElementById("repriced").textContent = n.repriced;
    document.getElementById("balanced").textContent = l.balanced ? "yes" : "NO";

    document.getElementById("feed").innerHTML = (e.events || []).map(ev =>
      `<div><span class="${ev.allowed ? "ok" : "blocked"}">${ev.allowed ? "ALLOW" : "BLOCK"}</span>
       ${ev.vendor} ${usd(ev.amount_cents)} — ${ev.protection}: ${ev.reason}</div>`).join("")
      || "<div>no spend decisions yet</div>";

    document.getElementById("ledger").innerHTML = (l.transactions || []).map(t =>
      `<tr><td>${t.id}</td><td>${t.kind}</td><td>${t.memo || ""}</td><td>${usd(t.debit)}</td></tr>`).join("");
  } catch (err) { /* dashboard is read-only; ignore transient fetch errors */ }
}
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
