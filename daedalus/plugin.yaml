name: daedalus
version: 0.2.0
description: Financial control plane for Hermes agents. Quote, earn via Stripe, spend through a three-protection authorization gate, run a real security audit on Nemotron, book double-entry, and reprice.
author: esaradev
provides_tools:
  - treasury_intake
  - treasury_collect
  - treasury_fulfill
  - treasury_run_paid_audit
  - treasury_abandon
  - treasury_pnl
  - treasury_open_orders
  - treasury_evolve
  - treasury_rollback
  - treasury_test_guardrails
  - treasury_recall
  - treasury_cfo
provides_hooks:
  - on_session_start
  - on_session_end
requires_env:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter key for NVIDIA Nemotron (Nemotron 3 Ultra is free). Without it, the audit summary runs as a labelled stub."
    url: "https://openrouter.ai/keys"
    secret: true
  - name: STRIPE_SECRET_KEY
    description: "Stripe TEST-MODE secret key (sk_test_...). Without it, Stripe earn/spend run as labelled stubs, no real charges. Use a TEST key only."
    url: "https://dashboard.stripe.com/test/apikeys"
    secret: true
